<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        To-do List
    </title>
</head>
<body>
    <section class="todo">
        <div class="content">
        <div class="logo">Add Task</div>
        <input type="text" class="todo-input" placeholder="Add task">
        <button class="add-todo-btn">Add</button>
        <p class="text"></p>
        <ul class="todo-list"></ul>
        </div>
    </section>

    <section class="saveItem">
        <h1 class="save-logo">Saved Leads</h1>
        <div class="saved">
        <h2 class="saves">Leads</h2>
        <ul class="leads">
        </ul>
        </div>
    </section>
</body>
</html>
